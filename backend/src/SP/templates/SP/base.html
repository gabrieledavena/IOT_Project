<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'SP/style.css' %}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url 'SP:home' %}">Home</a></li>
            <li><a href="/admin">Admin</a></li>
            {% if user.is_authenticated %}
                <li>Welcome, {{ user.username }}!</li>
                <li>
                    
            <form action="{% url 'SP:logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                    <button type="submit" class="custom-logout-button">Logout</button>
                </form>
            {% else %}
                <li><a href="{% url 'SP:login' %}">Login</a></li>
                <li><a href="{% url 'SP:register' %}">Register</a></li>
            {% endif %}
        </ul>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
